<style>
:root {
  --rw-dark:#22272B; --rw-red:#C74634; --rw-red-light:#FFF5F3; --rw-red-mid:#F5C5BA;
  --rw-red-deep:#9B2915; --rw-bg:#F6F6F6; --rw-surface:#FFFFFF; --rw-border:#E8DED9;
  --rw-text:#22272B; --rw-muted:#737373; --rw-shadow:0 4px 20px rgba(0,0,0,0.07);
  --rw-shadow-lg:0 8px 36px rgba(199,70,52,0.12);
}
.ins3-page { max-width:1100px; margin:0 auto; padding:36px 24px 64px; font-family:'Inter','Segoe UI',Arial,sans-serif; color:var(--rw-text); }
.ins3-header { margin-bottom:28px; }
.ins3-title { font-size:1.7rem; font-weight:900; color:var(--rw-dark); margin:0 0 4px; }
.ins3-sub { font-size:0.93rem; color:var(--rw-muted); }
.ins3-section-lbl { font-size:0.7rem; text-transform:uppercase; letter-spacing:1.2px; color:var(--rw-muted); font-weight:700; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--rw-border); }
.ins3-divider { height:1px; background:var(--rw-border); margin:32px 0; }

/* ── FEATURED ── */
.ins3-featured { background:var(--rw-surface); border:1px solid var(--rw-border); border-radius:16px; padding:36px; margin-bottom:28px; box-shadow:var(--rw-shadow); display:grid; grid-template-columns:84px 1fr; gap:28px; align-items:flex-start; transition:box-shadow 0.2s; }
.ins3-featured:hover { box-shadow:var(--rw-shadow-lg); }
@media(max-width:700px){ .ins3-featured { grid-template-columns:1fr; } }
.ins3-feat-icon { width:84px; height:84px; border-radius:14px; background:var(--rw-dark); display:flex; align-items:center; justify-content:center; font-size:2.1rem; flex-shrink:0; }
.ins3-feat-body {}
.ins3-feat-tag { display:inline-flex; align-items:center; background:var(--rw-red-light); border:1px solid var(--rw-red-mid); border-radius:6px; padding:3px 10px; font-size:0.7rem; color:var(--rw-red-deep); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; }
.ins3-feat-title { font-size:1.3rem; font-weight:900; color:var(--rw-dark); line-height:1.3; margin-bottom:10px; }
.ins3-feat-excerpt { font-size:0.93rem; line-height:1.7; color:var(--rw-muted); margin-bottom:18px; }
.ins3-feat-footer { display:flex; align-items:center; justify-content:space-between; }
.ins3-date { font-size:0.75rem; color:#aaa; }
.ins3-req-btn { font-size:0.8rem; font-weight:700; color:var(--rw-red); text-decoration:none; background:var(--rw-red-light); border:1px solid var(--rw-red-mid); padding:6px 16px; border-radius:7px; transition:all 0.18s; display:inline-block; }
.ins3-req-btn:hover { background:var(--rw-red); color:#fff; }

/* ── ARTICLE GRID ── */
.ins3-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }

.ins3-card { background:var(--rw-surface); border:1px solid var(--rw-border); border-radius:14px; padding:22px; box-shadow:var(--rw-shadow); display:flex; flex-direction:column; gap:10px; transition:all 0.22s; }
.ins3-card:hover { box-shadow:var(--rw-shadow-lg); border-color:var(--rw-red-mid); transform:translateY(-2px); }
.ins3-card-tag { display:inline-flex; align-items:center; background:var(--rw-red-light); border:1px solid var(--rw-red-mid); border-radius:6px; padding:3px 10px; font-size:0.7rem; color:var(--rw-red-deep); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; width:fit-content; }
.ins3-card-title { font-size:0.97rem; font-weight:800; color:var(--rw-dark); line-height:1.35; flex:1; }
.ins3-card-excerpt { font-size:0.84rem; line-height:1.6; color:var(--rw-muted); }
.ins3-card-footer { display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--rw-border); padding-top:10px; margin-top:auto; }
.ins3-card-date { font-size:0.73rem; color:#aaa; }
.ins3-card-read { font-size:0.77rem; font-weight:700; color:var(--rw-red); text-decoration:none; transition:color 0.18s; }
.ins3-card-read:hover { color:var(--rw-red-deep); text-decoration:underline; }

/* ── COMING SOON ── */
.ins3-coming { background:var(--rw-bg); border:1.5px dashed var(--rw-border); border-radius:14px; padding:30px; text-align:center; color:#bbb; font-size:0.88rem; font-weight:600; }
.ins3-coming span { font-size:0.8rem; font-weight:400; color:#ccc; display:block; margin-top:6px; }

.series-banner-icon { font-size:1.8rem; flex-shrink:0; }

.series-ep-count { margin-left:auto; background:rgba(255,255,255,0.1); color:#fff; font-size:0.72rem; font-weight:700; padding:5px 14px; border-radius:20px; white-space:nowrap; }

.series-article { background:var(--rw-surface); border:1px solid var(--rw-border); border-radius:14px; overflow:hidden; box-shadow:var(--rw-shadow); margin-bottom:14px; }

.series-meta { display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
.series-ep-badge { background:var(--rw-red); color:#fff; font-size:0.62rem; font-weight:800; padding:2px 9px; border-radius:4px; text-transform:uppercase; letter-spacing:0.4px; }
.series-tag { font-size:0.68rem; color:var(--rw-red); font-weight:700; }
.series-article-date { font-size:0.7rem; color:var(--rw-muted); }
.series-article-title { font-size:1rem; font-weight:900; color:var(--rw-dark); margin:0 0 6px; line-height:1.35; }
.series-article-summary { font-size:0.84rem; color:#666; line-height:1.6; margin:0 0 10px; }
.series-article-tags { display:flex; gap:6px; flex-wrap:wrap; }
.series-pill { background:var(--rw-bg); border:1px solid var(--rw-border); color:var(--rw-muted); font-size:0.65rem; font-weight:700; padding:2px 9px; border-radius:5px; }
.series-read-time { font-size:0.7rem; color:var(--rw-muted); margin-top:6px; }
.series-expand-btn { width:30px; height:30px; border-radius:50%; border:1.5px solid var(--rw-border); background:var(--rw-bg); color:var(--rw-muted); cursor:pointer; font-size:1.1rem; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.2s; align-self:center; line-height:1; }
.series-expand-btn:hover { border-color:var(--rw-red); color:var(--rw-red); background:var(--rw-red-light); }
.series-expand-btn.open { background:var(--rw-red); border-color:var(--rw-red); color:#fff; transform:rotate(45deg); }

.series-body { border-top:1px solid var(--rw-border); padding:26px 26px 30px; display:none; }
.series-body.visible { display:block; }
.series-h2 { font-size:0.98rem; font-weight:800; color:var(--rw-dark); margin:0 0 10px; display:flex; align-items:center; gap:8px; }
.series-h2::before { content:''; display:inline-block; width:3px; height:16px; background:var(--rw-red); border-radius:2px; flex-shrink:0; }
.series-p { font-size:0.87rem; line-height:1.75; color:#444; margin:0 0 12px; }
.series-callout { background:var(--rw-red-light); border-left:3px solid var(--rw-red); border-radius:0 8px 8px 0; padding:12px 16px; margin:12px 0; }
.series-callout p { font-size:0.84rem; color:var(--rw-dark); line-height:1.6; margin:0; font-weight:500; }
.series-list { padding-left:0; list-style:none; margin:8px 0; display:flex; flex-direction:column; gap:7px; }
.series-list li { font-size:0.85rem; color:#444; line-height:1.6; padding-left:18px; position:relative; }
.series-list li::before { content:'▸'; color:var(--rw-red); position:absolute; left:0; font-size:0.68rem; top:3px; }
.series-compare-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px; }
@media(max-width:580px){ .series-compare-grid { grid-template-columns:1fr; } }
.series-compare-card { background:var(--rw-bg); border:1px solid var(--rw-border); border-radius:10px; padding:12px 14px; }
.series-compare-card h4 { font-size:0.76rem; font-weight:800; color:var(--rw-dark); margin:0 0 7px; text-transform:uppercase; letter-spacing:0.4px; }
.series-compare-card ul { padding-left:0; list-style:none; margin:0; display:flex; flex-direction:column; gap:4px; }
.series-compare-card ul li { font-size:0.78rem; color:#555; padding-left:15px; position:relative; }
